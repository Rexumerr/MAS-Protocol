name: 🌌 MAS-Protocol Deployment (Rexumer Exclusive)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual execution for testing and Apex verification

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-check:
    name: 🏗️ Build-Check (MAS-Protocol Core)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust (dtolnay/rust-toolchain)
        uses: dtolnay/rust-toolchain@stable

      - name: 🏎️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/core-rs

      - name: 🛠️ Build Brain CLI
        run: |
          cd packages/core-rs
          cargo build --release --bin brain-cli
          chmod +x target/release/brain-cli

      - name: 🛡️ Verify Core Authority
        run: echo "MAS-Protocol Core Verified by Rexumer Authority"

  security-gate:
    name: 🔐 Security-Gate (Rexumer Environment)
    needs: build-check
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Rexumerr'
    steps:
      - name: 🛡️ Audit Authorization
        run: |
          echo "[*] Initializing Rexumer Authority Audit..."
          echo "[+] Environment Authorized: ACCESS GRANTED"

  sync-and-deploy:
    name: 🧬 Sync & Dashboard Deploy
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📦 Install Dependencies
        run: pnpm install

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🛠️ Build Brain CLI (Internal)
        run: cd packages/core-rs && cargo build --release --bin brain-cli

      - name: 🧬 Sync Multiversal Metrics
        run: |
          export PATH=$PATH:$(pwd)/packages/core-rs/target/release
          pnpm run sync
        env:
          ORACLE_TOKEN: ${{ secrets.ORACLE_TOKEN }}
          NODE_ENV: production

      - name: 🏗️ Build Dashboard (Astro)
        run: pnpm run build

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/dist

  deploy-pages:
    name: 🚀 Finalize Pages Deploy
    needs: sync-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  build-apk:
    name: 🔨 Native APK Manifestation
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📦 Install Dependencies
        run: pnpm install

      - name: 🏗️ Build Web App
        run: cd apps/web && pnpm run build

      - name: 📲 Sync Capacitor
        run: pnpm exec cap sync android

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rexumer-mas-protocol-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
