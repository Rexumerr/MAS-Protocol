name: 🌌 MAS-Protocol Deployment (Rexumer Apex)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # STAGE 1: AUTHORITY & SECURITY
  security-gate:
    name: 🔐 Security-Gate (Rexumer Authority)
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Rexumerr'
    steps:
      - name: 🛡️ Audit Authorization
        run: |
          echo "[*] Initializing Rexumer Authority Audit..."
          echo "[+] Environment Authorized: ACCESS GRANTED"

  # STAGE 2: BACKEND CORE (RUST)
  build-core:
    name: 🦀 Build-Check (Rust Core)
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: 🏎️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/core-rs
            packages/vanguard-os

      - name: 🛠️ Compile Kernel
        run: |
          cd packages/core-rs
          cargo build --release --bin brain-cli
          cargo build --release --bin handshake

      - name: 📤 Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: mas-core-binaries
          path: packages/core-rs/target/release/brain-cli

  # STAGE 3: DASHBOARD & SYNC (PNPM)
  sync-and-build-web:
    name: 🧬 Sync & Web Manifestation
    needs: [security-gate, build-core]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: ⚡ Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📥 Download Core Binaries
        uses: actions/download-artifact@v4
        with:
          name: mas-core-binaries
          path: bin/

      - name: 🧬 Sync Metrics
        run: |
          chmod +x bin/brain-cli
          export PATH=$PATH:$(pwd)/bin
          pnpm run sync
        env:
          ORACLE_TOKEN: ${{ secrets.ORACLE_TOKEN }}
          NODE_ENV: production

      - name: 🏗️ Build Dashboard (Astro)
        run: pnpm run build

      - name: 📤 Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  # STAGE 4: NATIVE APK (GRADLE)
  build-apk:
    name: 🔨 Native APK Manifestation
    needs: [security-gate, sync-and-build-web]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🔍 Verify JAVA_HOME
        run: echo "JAVA_HOME is $JAVA_HOME"

      - name: 🛠️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: ⚡ Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📥 Download Web Dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: 📲 Sync Capacitor
        run: |
          pnpm exec cap sync android

      - name: 🔨 Build Unsigned APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rexumer-mas-protocol-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # STAGE 5: FINAL DEPLOY
  deploy-pages:
    name: 🚀 Finalize Pages Deploy
    needs: sync-and-build-web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: 📥 Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: web-dist
