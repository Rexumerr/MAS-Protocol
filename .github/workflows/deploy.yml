name: 🌌 Multiversal Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🏎️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/core-rs

      - name: 🛠️ Build Brain CLI
        run: |
          cd packages/core-rs
          cargo build --release --bin brain-cli
          chmod +x target/release/brain-cli

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧬 Sync Multiversal Metrics
        run: |
          export PATH=$PATH:$(pwd)/packages/core-rs/target/release
          npx ts-node scripts/sync-metrics.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORACLE_TOKEN: ${{ secrets.ORACLE_TOKEN }}

      - name: 🏗️ Build Dashboard (Astro)
        run: npm run build

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/dist

  deploy:
    needs: sync-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    needs: sync-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Web App
        run: cd apps/web && npm run build

      - name: 📲 Sync Capacitor
        run: npx cap sync android

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rexumer-mas-protocol-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
