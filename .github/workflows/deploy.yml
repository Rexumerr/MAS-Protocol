name: 🌌 Multiversal Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *' # Cada 12 horas

# Permisos necesarios para desplegar en GitHub Pages
permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🛠️ Build Brain CLI
        run: |
          cd packages/core-rs
          cargo build --release --bin brain-cli

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧬 Sync Multiversal Metrics
        run: |
          npx ts-node scripts/sync-metrics.ts

      - name: 🏗️ Build Dashboard (Astro)
        run: |
          npm run build

      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
