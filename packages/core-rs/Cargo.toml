[package]
name = "core-rs"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "brain-cli"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"
async-trait = "0.1"
futures = "0.3"
uuid = { version = "1.0", features = ["v4", "wasm-bindgen"] }
dashmap = "5.5"
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.0", features = ["derive"] } # CLI argument parsing
anyhow = "1.0"
