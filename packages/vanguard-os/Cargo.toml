[package]
name = "vanguard-os"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "vanguard-os"
path = "src/main.rs"

[[bin]]
name = "sentinel"
path = "src/sentinel.rs"

[dependencies]
tokio = { version = "1.40", features = ["full"] }
sysinfo = "0.33"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
chrono = "0.4"
colored = "3.0"
indicatif = "0.17"
